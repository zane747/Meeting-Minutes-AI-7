{% extends "base.html" %}

{% block title %}修改密碼 - Meeting Minutes AI{% endblock %}

{% block content %}
<div class="max-w-md mx-auto mt-16">
    <div class="text-center mb-8">
        <h1 class="text-3xl font-bold text-gray-800">修改密碼</h1>
        <p class="text-gray-500 mt-2">請先輸入舊密碼驗證身份</p>
    </div>

    {# 成功訊息 #}
    {% if message %}
    <div class="bg-green-50 border border-green-200 text-green-700 px-4 py-3 rounded-lg mb-6">
        {{ message }}
    </div>
    {% endif %}

    {# 錯誤訊息 #}
    {% if error %}
    <div class="bg-red-50 border border-red-200 text-red-700 px-4 py-3 rounded-lg mb-6">
        {{ error }}
    </div>
    {% endif %}

    <form action="/accounts/change-password" method="post" class="bg-white shadow-md rounded-lg px-8 py-8 space-y-6">

        <div>
            <label for="old_password" class="block text-sm font-medium text-gray-700 mb-1">
                舊密碼
            </label>
            <input
                type="password"
                id="old_password"
                name="old_password"
                placeholder="請輸入目前的密碼"
                required
                class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent"
            >
        </div>

        <div>
            <label for="new_password" class="block text-sm font-medium text-gray-700 mb-1">
                新密碼
            </label>
            <input
                type="password"
                id="new_password"
                name="new_password"
                placeholder="至少 8 個字元"
                minlength="8"
                required
                class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent"
            >
        </div>

        <button
            type="submit"
            class="w-full bg-blue-600 text-white py-2 px-4 rounded-lg hover:bg-blue-700 transition-colors font-medium"
        >
            確認修改
        </button>
    </form>

    {% if current_user.role <= 2 %}
    <p class="text-center text-gray-500 mt-6">
        <a href="/accounts" class="text-blue-600 hover:underline">返回帳號管理</a>
    </p>
    {% endif %}
</div>
{% endblock %}
